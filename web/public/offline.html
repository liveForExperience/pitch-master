<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <title>PitchMaster · 离线</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: ui-sans-serif, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
      p { font-size: 0.875rem; line-height: 1.5; color: #64748b; margin-bottom: 1rem; }
      button {
        min-height: 3rem;
        width: 100%;
        border: none;
        border-radius: 1rem;
        background: #10b981;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      button:active { background: #059669; }
    </style>
  </head>
  <body>
    <main>
      <h1>当前无法连接网络</h1>
      <p>
        PitchMaster 已缓存应用界面，录入页的进球与撤销会暂存在本机，恢复网络后自动同步。
      </p>
      <button type="button" onclick="location.reload()">重试连接</button>
    </main>
  </body>
</html>
