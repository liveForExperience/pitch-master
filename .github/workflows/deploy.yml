name: Deploy to ECS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'AGENTS.md'
      - 'DEVELOPMENT_PLAN.md'
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build, package and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # setup-node 的 npm cache 只存 tarball；npm ci 仍会每次重建 node_modules。
      # lockfile 未变时直接 restore node_modules，跳过 npm ci（~89s → ~15s）。
      - name: Restore node_modules cache
        id: node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
            web/node_modules
          key: ${{ runner.os }}-node20-nm-${{ hashFiles('package-lock.json') }}

      - name: Install
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      # Build 与 Test 互不依赖；在同一 runner 内后台并行。
      # 注：backend `build` = `tsc -p ...`，web `build` = `tsc -b && vite build`，
      # 两者本身已做完整类型检查，因此无需独立的 typecheck step。
      - name: Build + Test (parallel)
        run: |
          set -euo pipefail
          npm run build > build.log 2>&1 &
          BUILD_PID=$!
          npm test > test.log 2>&1 &
          TEST_PID=$!

          BUILD_RC=0
          TEST_RC=0
          wait $BUILD_PID || BUILD_RC=$?
          wait $TEST_PID  || TEST_RC=$?

          echo "===== build.log ====="
          cat build.log
          echo "===== test.log ====="
          cat test.log

          if [ $BUILD_RC -ne 0 ] || [ $TEST_RC -ne 0 ]; then
            echo "✘ build_rc=$BUILD_RC test_rc=$TEST_RC"
            exit 1
          fi

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          test -f backend/dist/index.js
          test -f backend/dist/db/migrations/0000_initial.sql
          test -f backend/dist/assets/fonts/NotoSansSC-Regular-subset.woff
          test -f backend/dist/assets/fonts/NotoSansSC-Bold-subset.woff
          test -f backend/dist/assets/fonts/GeistMono-Medium-subset.woff
          test -f backend/dist/assets/fonts/Newsreader-Italic-subset.woff
          test -f web/dist/index.html
          echo "✓ migrations + dist artifacts present"

      - name: Package release tarball
        run: |
          set -euo pipefail
          mkdir -p release
          # 只打部署期需要的产物
          cp package.json package-lock.json release/
          mkdir -p release/backend
          cp backend/package.json release/backend/package.json
          cp -r backend/dist     release/backend/dist
          mkdir -p release/web
          cp web/package.json    release/web/package.json
          cp -r web/dist         release/web/dist
          tar -czf release.tar.gz -C release .
          ls -lh release.tar.gz

      - name: Prepare SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY"     > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release tarball
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            release.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/release.tar.gz"

      - name: Trigger deploy on ECS
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "/opt/pitchmaster-v2/bin/deploy-receive.sh ${GIT_SHA}"

      - name: Verify via public health endpoint
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          # 指数退避：前几次紧凑探测，命中即返回；累计上限 ~21s。
          delays=(0 1 1 2 2 3 3 4 5)
          for d in "${delays[@]}"; do
            sleep "$d"
            if curl -fsS --max-time 3 "http://${DEPLOY_HOST}/api/health"; then
              echo
              echo "✅ Public health check OK"
              exit 0
            fi
            echo "  retry after ${d}s..."
          done
          echo "✘ Public health check failed"
          exit 1
