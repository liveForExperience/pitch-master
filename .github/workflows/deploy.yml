name: Deploy to ECS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'legacy/**'
      - '.gitignore'
      - 'AGENTS.md'
      - 'DEVELOPMENT_PLAN.md'
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build, package and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (backend + web)
        run: npm run build

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          test -f backend/dist/index.js
          test -f backend/dist/db/migrations/0000_initial.sql
          test -f backend/dist/assets/fonts/NotoSansSC-Regular-subset.woff
          test -f backend/dist/assets/fonts/NotoSansSC-Bold-subset.woff
          test -f backend/dist/assets/fonts/GeistMono-Medium-subset.woff
          test -f backend/dist/assets/fonts/Newsreader-Italic-subset.woff
          test -f web/dist/index.html
          echo "✓ migrations + dist artifacts present"

      - name: Package release tarball
        run: |
          set -euo pipefail
          mkdir -p release
          # 只打部署期需要的产物
          cp package.json package-lock.json release/
          mkdir -p release/backend
          cp backend/package.json release/backend/package.json
          cp -r backend/dist     release/backend/dist
          mkdir -p release/web
          cp web/package.json    release/web/package.json
          cp -r web/dist         release/web/dist
          tar -czf release.tar.gz -C release .
          ls -lh release.tar.gz

      - name: Prepare SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY"     > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release tarball
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            release.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/release.tar.gz"

      - name: Trigger deploy on ECS
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "/opt/pitchmaster-v2/bin/deploy-receive.sh ${GIT_SHA}"

      - name: Verify via public health endpoint
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "http://${DEPLOY_HOST}/api/health"; then
              echo
              echo "✅ Public health check OK"
              exit 0
            fi
            echo "  retry $i..."
            sleep 2
          done
          echo "✘ Public health check failed"
          exit 1
