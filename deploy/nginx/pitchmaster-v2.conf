server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/pitchmaster-v2/current/web/dist;
    index index.html;

    access_log /var/log/nginx/pitchmaster-v2.access.log;
    error_log  /var/log/nginx/pitchmaster-v2.error.log warn;

    # API 反代到 Hono backend
    # NOTE: 必须用 `^~` 前缀匹配，否则会被下方 `\.png$` 等正则 location 抢先命中，
    # 导致 /api/events/<id>/poster.png 这类二进制 API 被当成静态文件 404。
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # SSE-friendly：不缓冲、长连接
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Uptime 探活（Phase 3 T3.5）
    location = /api/healthz {
        proxy_pass http://127.0.0.1:3000/api/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA fallback：所有未命中静态文件的路由都交给 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源积极缓存
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
