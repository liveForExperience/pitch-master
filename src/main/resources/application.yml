spring:
  profiles:
    active: h2 # 默认激活 H2 配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.bottomlord: debug

match:
  grouping:
    default-strategy: SIMPLE_SKILL_BALANCE
